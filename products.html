<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse premium skincare and fragrance products" />
    <title>White Label Fragrances | Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header class="sticky-top bg-white shadow-sm">
      <nav class="navbar navbar-expand-lg container py-3" aria-label="Main navigation">
        <a class="navbar-brand brand-logo" href="index.html"><img src="PICS/LOGO.jpeg" alt="" class="brand-logo-img" width="36" height="36" />White Label Fragrances</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto me-lg-3 gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="cart.html">Cart & Wishlist</a></li>
          </ul>
          <input class="form-control" id="globalSearch" type="search" placeholder="Search products" />
        </div>
      </nav>
    </header>

    <main class="container py-5">
      <div class="section-heading text-center mb-4">
        <h1>Luxury Product Collection</h1>
        <p>Explore elegant essentials for skincare, fragrance, and wellness.</p>
      </div>

      <nav aria-label="Product categories" class="mb-4">
        <div class="d-flex gap-2 flex-wrap justify-content-center">
          <button class="btn btn-outline-brand category-filter active" data-category="all">All</button>
          <button class="btn btn-outline-brand category-filter" data-category="50ml Fragrances">50ml Fragrances</button>
          <button class="btn btn-outline-brand category-filter" data-category="Premium Collection">Premium</button>
          <button class="btn btn-outline-brand category-filter" data-category="Body Care">Body Care</button>
          <button class="btn btn-outline-brand category-filter" data-category="Diffusers">Diffusers</button>
        </div>
      </nav>

      <section class="row g-4" id="productGrid" aria-live="polite"></section>
    </main>

    <footer class="site-footer mt-5">
      <div class="container py-4 text-center">
        <p class="mb-0">&copy; 2026 White Label Fragrances. Crafted for beauty and wellness lovers.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
